<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة البث الملكية الفاخرة</title>
    <!-- استدعاء مكتبة زيبو كلاود الرسمية للويب -->
    <script src="https://unpkg.com"></script>
    <!-- ربط ملف التنسيق الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="royal-container">
    <!-- منطقة بث الفيديو الحية (تدعم الشاشة الفردية أو التحدي المقسم) -->
    <div class="video-section" id="videoContainer">
        <div class="video-box" id="localVideo"></div>
        <div class="video-box" id="remoteVideo" style="display: none;"></div>
    </div>

    <!-- الشريط العلوي لمعلومات الحساب المضيف والتحديات -->
    <div class="top-bar">
        <div class="host-info">
            <div class="avatar"></div>
            <span class="host-name">الملك الحساب الملكي ✨</span>
        </div>
        <button class="btn-gold" onclick="togglePK()">تحدي PK</button>
    </div>

    <!-- تأثير التيك توك الجديد لملء منتصف الشاشة بالهدايا الفخمة -->
    <div class="tiktok-gift-container" id="tiktokGiftOverlay">
        <div class="tiktok-gift-icon" id="giftAnimationIcon">👑</div>
        <div class="tiktok-gift-text" id="giftAnimationText">التاج الملكي 👑</div>
    </div>

    <!-- الواجهة السفلية: الشات الكتابي وصندوق الهدايا الفخم -->
    <div class="bottom-section">
        <!-- شاشة عرض رسائل الدردشة -->
        <div class="chat-box" id="chatBox">
            <div class="chat-message"><span class="user-name">النظام:</span> أهلاً بكم في البث الملكي الفاخر. تم ربط السيرفر بنجاح!</div>
        </div>

        <!-- أزرار إرسال الهدايا الملكية السريعة -->
        <div class="gifts-grid">
            <div class="gift-item" onclick="sendGift('التاج الملكي 👑')">
                <span class="gift-icon">👑</span>
                <span class="gift-price">500 نقطة</span>
            </div>
            <div class="gift-item" onclick="sendGift('السيارة الفاخرة 🏎️')">
                <span class="gift-icon">🏎️</span>
                <span class="gift-price">300 نقطة</span>
            </div>
            <div class="gift-item" onclick="sendGift('الأسد الذهبي 🦁')">
                <span class="gift-icon">🦁</span>
                <span class="gift-price">1000 نقطة</span>
            </div>
        </div>

        <!-- حقل إدخال وكتابة الرسائل -->
        <div class="controls-row">
            <input type="text" class="input-chat" id="chatInput" placeholder="اكتب رسالة راقية هنا...">
            <button class="btn-gold" onclick="sendMessage()">إرسال</button>
        </div>
    </div>
</div>

<!-- ربط ملف البرمجة والتشغيل الخارجي -->
<script src="script.js"></script>
</body>
</html>
