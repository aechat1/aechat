<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة البث المباشر</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #111; font-family: sans-serif; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 100vw; height: 100vh; height: -webkit-fill-available; background: #000; position: relative; display: flex; flex-direction: column; box-sizing: border-box; }
        .video-section { flex: 1; background: #222; position: relative; display: flex; height: 100%; }
        .video-box { flex: 1; width: 100%; height: 100%; min-height: 400px; background: #000; position: relative; overflow: hidden; display: flex; }
        .video-box video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        .top-bar { position: absolute; top: 20px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 10; }
        .host-info { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .bottom-section { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 70%, rgba(0,0,0,0)); padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .chat-box { height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-message { background: rgba(255, 255, 255, 0.1); padding: 8px 12px; border-radius: 12px; font-size: 13px; max-width: 85%; }
        .user-name { color: #ffd700; font-weight: bold; margin-left: 5px; }
        .controls-row { display: flex; gap: 10px; }
        .input-chat { flex: 1; background: rgba(255, 255, 255, 0.15); border: 1px solid #444; padding: 12px; border-radius: 25px; color: #fff; outline: none; }
        .btn-send { background: #ffd700; border: none; padding: 10px 20px; border-radius: 25px; color: #000; font-weight: bold; cursor: pointer; }
        .gifts-grid { display: flex; gap: 10px; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; }
        .gift-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; font-size: 20px; }
        .gift-price { font-size: 10px; color: #ccc; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="video-section">
        <div class="video-box" id="localVideo"></div>
        <div class="video-box" id="remoteVideo" style="display: none;"></div>
    </div>
    <div class="top-bar">
        <div class="host-info">المضيف المباشر 🎥</div>
        <button class="btn-send" style="padding: 5px 15px;" onclick="togglePK()">تحدي PK</button>
    </div>
    <div class="bottom-section">
        <div class="chat-box" id="chatBox">
            <div class="chat-message"><span class="user-name">النظام:</span> أهلاً بك. تم تفعيل نظام الكاميرا المباشر الحتمي.</div>
        </div>
        <div class="gifts-grid">
            <div class="gift-item" onclick="sendGift('تاج 👑')">👑<span class="gift-price">500ن</span></div>
            <div class="gift-item" onclick="sendGift('سيارة 🏎️')">🏎️<span class="gift-price">300ن</span></div>
            <div class="gift-item" onclick="sendGift('أسد 🦁')">🦁<span class="gift-price">1000ن</span></div>
        </div>
        <div class="controls-row">
            <input type="text" class="input-chat" id="chatInput" placeholder="اكتب رسالة هنا...">
            <button class="btn-send" onclick="sendMessage()">إرسال</button>
        </div>
    </div>
</div>
<script>
const appID = 896349332; 
const server = "wss://webliveroom" + appID + "://zegocloud.com";
const zg = new ZegoExpressEngine(appID, server);
async function startLiveNow() {
    try {
        // إجبار المتصفح على فتح الكاميرا محلياً فوراً وتخطي حماية السيرفر
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        const videoElement = document.createElement('video');
        videoElement.srcObject = stream;
        videoElement.autoplay = true;
        videoElement.playsInline = true;
        videoElement.muted = true;
        document.getElementById('localVideo').appendChild(videoElement);
        
        // الاتصال بالخلفية لـ زيبوكلاود
        await zg.loginRoom('room_01', '', { userID: 'user_' + Math.floor(Math.random() * 100), userName: 'host' });
        const localStream = await zg.createStream();
        zg.startPublishingStream('stream_01', localStream);
    } catch (e) {
        alert("يرجى الضغط على القفل بجانب الرابط وتفعيل إذن الكاميرا والميكروفون يدوياً.");
    }
}
window.onload = startLiveNow;

function sendMessage() {
    const input = document.getElementById('chatInput');
    if(input.value.trim() === "") return;
    const msg = document.createElement('div');
    msg.className = 'chat-message';
    msg.innerHTML = `<span class="user-name">أنت:</span> ${input.value}`;
    document.getElementById('chatBox').appendChild(msg);
    input.value = "";
}
function sendGift(name) {
    const msg = document.createElement('div');
    msg.className = 'chat-message';
    msg.style.color = '#ffd700';
    msg.innerHTML = `🎁 تم إرسال هدية: ${name}`;
    document.getElementById('chatBox').appendChild(msg);
}
let isPK = false;
function togglePK() {
    isPK = !isPK;
    document.getElementById('remoteVideo').style.display = isPK ? 'flex' : 'none';
}
</script>
</body>
                                                                                                                                </html>
